services:
  db:
    image: postgres:latest
    container_name: blog-db
    restart: always
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: changemeinprod!
      POSTGRES_DB: postgres

  adminer:
    image: adminer:latest
    restart: always
    ports:
      - "8888:8080"